name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:

  # ── Job 1: Lint ──────────────────────────────────────────────────────────────
  # Verifica estilo y errores estáticos en src/, notebooks/ y data/.
  # Es el job más rápido (~15s) — falla rápido si hay problemas de sintaxis.
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Run linter
        run: ruff check src/ notebooks/ data/ --ignore E501

  # ── Job 2: Unit Tests ────────────────────────────────────────────────────────
  # Genera el dataset y corre pytest contra src/utils.py.
  # Valida que validate_data(), compute_kpis() y load_data() se comporten correctamente.
  # Solo corre si lint pasó.
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas numpy matplotlib seaborn scipy pytest

      - name: Generate dataset
        run: python data/generate_data.py

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── Job 3: Run Notebooks ─────────────────────────────────────────────────────
  # Ejecuta los 4 notebooks como scripts Python en modo headless (sin display).
  # MPLBACKEND=Agg evita que matplotlib intente abrir ventanas gráficas.
  # Los gráficos generados se suben como artifact descargable (7 días de retención).
  # Solo corre si test pasó.
  notebooks:
    name: Run Notebooks (headless)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install pandas numpy matplotlib seaborn scipy

      - name: Generate dataset
        run: python data/generate_data.py

      - name: Run 01 - EDA
        env:
          MPLBACKEND: Agg
        run: python notebooks/01_EDA.py

      - name: Run 02 - KPIs Analysis
        env:
          MPLBACKEND: Agg
        run: python notebooks/02_kpis_analysis.py

      - name: Run 03 - Discount Insights
        env:
          MPLBACKEND: Agg
        run: python notebooks/03_discount_insights.py

      - name: Run 04 - Advanced Insights
        env:
          MPLBACKEND: Agg
        run: python notebooks/04_advanced_insights.py

      - name: Upload generated figures
        uses: actions/upload-artifact@v4
        with:
          name: generated-figures
          path: reports/figures/
          retention-days: 7